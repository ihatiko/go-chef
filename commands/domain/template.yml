tree:
  domain-components:
    name: internal
    nodes:
      - name: features
        nodes:
          - name: {{.DomainName}}
            generated-files:
              - name: repository
                extension: go
                template: repository
              - name: service
                extension: go
                template: service
              - name: transport!
                extension: go
                template: transport
            nodes:
              - name: types
                generated-files:
                  name: types
                  extension: go
                  template: domain-types
              - name: service
                generated-files:
                  name: service
                  extension: go
                  template: domain-service